<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LocalHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background: #0f172a; color: white; font-family: system-ui; padding: 20px; padding-bottom: 140px; }
    .card { background: #1e293b; padding: 15px; margin: 10px 0; border-radius: 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 10px; }
    .item { background: #334155; padding: 12px; border-radius: 10px; cursor: pointer; text-align: left; }
    .item:hover { background: #475569; }
    .item-icon { font-size: 28px; margin-bottom: 5px; }
    .item-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .item-meta { font-size: 12px; color: #94a3b8; }
    .hidden { display: none; }
    #player { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; padding: 15px; border-radius: 12px 12px 0 0; z-index: 100; }
    .btn-danger { background: #dc2626; color: white; border: none; padding: 10px 15px; border-radius: 8px; margin-top: 10px; }
    input[type="file"] { color: white; margin: 10px 0; }
    .tag { font-size: 11px; background: #3b82f6; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
  </style>
</head>
<body>
  <h1>LocalHub 🎵🎬📺</h1>

  <div class="card">
    <h3>⬆️ Add Files</h3>
    <p>Upload mp3/mp4. Name files like "Action Movie.mp4" or "Series S01E01.mp4" for auto tags</p>
    <input type="file" accept="audio/*,video/*" multiple onchange="saveFiles(event)">
    <button class="btn-danger" onclick="clearAll()">🗑️ Delete All</button>
  </div>

  <div class="card">
    <h3>🎵 Music</h3>
    <div class="grid" id="music-grid">Loading...</div>
  </div>

  <div class="card">
    <h3>🎬 Movies</h3>
    <div class="grid" id="movies-grid">Loading...</div>
  </div>

  <div class="card">
    <h3>📺 Series</h3>
    <div class="grid" id="series-grid">Loading...</div>
  </div>

  <div id="player" class="hidden">
    <p id="title"></p>
    <audio id="audio" controls style="width:100%"></audio>
    <video id="video" controls style="width:100%;max-height:300px" class="hidden"></video>
    <button class="btn-danger" onclick="closePlayer()">Close</button>
  </div>

  <script>
    let db;
    indexedDB.open('LocalHubDB', 1).onupgradeneeded = e => {
      e.target.result.createObjectStore('media', { keyPath: 'id' });
    };
    indexedDB.open('LocalHubDB', 1).onsuccess = e => {
      db = e.target.result;
      loadFiles();
    };

    function saveFiles(e) {
      const tx = db.transaction('media', 'readwrite');
      for(let file of e.target.files) {
        tx.objectStore('media').add({
          id: file.name + Date.now(),
          name: file.name,
          type: file.type.startsWith('audio') ? 'audio' : 'video',
          blob: file
        });
      }
      tx.oncomplete = () => { alert('Saved!'); loadFiles(); }
    }

    // Classify video: movie vs series + genre from filename
    function classifyVideo(name) {
      const n = name.toLowerCase();
      let kind = 'movie';
      let genre = 'General';

      // Detect series: S01E01, Ep1, Episode 2, Season 1
      if(/s\d+e\d+|ep\d+|episode|season/.test(n)) {
        kind = 'series';
      }

      // Detect genre from keywords in filename
      if(n.includes('action') || n.includes('fight')) genre = 'Action';
      else if(n.includes('comedy') || n.includes('funny')) genre = 'Comedy';
      else if(n.includes('horror') || n.includes('scary') || n.includes('dead')) genre = 'Horror';
      else if(n.includes('romance') || n.includes('love')) genre = 'Romance';
      else if(n.includes('sci') || n.includes('space') || n.includes('future')) genre = 'Sci-Fi';
      else if(n.includes('doc') || n.includes('tutorial') || n.includes('learn')) genre = 'Tutorial';
      else if(n.includes('drama')) genre = 'Drama';

      return { kind, genre };
    }

    function loadFiles() {
      db.transaction('media').objectStore('media').getAll().onsuccess = e => {
        const files = e.target.result;
        const music = files.filter(f => f.type === 'audio');
        const videos = files.filter(f => f.type === 'video');
        
        const movies = videos.filter(v => classifyVideo(v.name).kind === 'movie');
        const series = videos.filter(v => classifyVideo(v.name).kind === 'series');

        // Music grid with 🎵 icon
        document.getElementById('music-grid').innerHTML = music.length
         ? music.map(m => `
            <div class="item" onclick="play('${m.name}','audio')">
              <div class="item-icon">🎵</div>
              <div class="item-name">${m.name}</div>
              <div class="item-meta">Audio file</div>
            </div>`).join('')
          : 'No music uploaded yet';

        // Movies grid with 🎬 + genre tag
        document.getElementById('movies-grid').innerHTML = movies.length
         ? movies.map(v => {
            const { genre } = classifyVideo(v.name);
            return `
            <div class="item" onclick="play('${v.name}','video')">
              <div class="item-icon">🎬</div>
              <div class="item-name">${v.name}</div>
              <div class="item-meta"><span class="tag">${genre}</span> Movie</div>
            </div>`;
           }).join('')
          : 'No movies uploaded yet';

        // Series grid with 📺 + genre tag
        document.getElementById('series-grid').innerHTML = series.length
         ? series.map(v => {
            const { genre } = classifyVideo(v.name);
            return `
            <div class="item" onclick="play('${v.name}','video')">
              <div class="item-icon">📺</div>
              <div class="item-name">${v.name}</div>
              <div class="item-meta"><span class="tag">${genre}</span> Series</div>
            </div>`;
           }).join('')
          : 'No series uploaded yet';
      };
    }

    function play(name, type) {
      db.transaction('media').objectStore('media').getAll().onsuccess = e => {
        const file = e.target.result.find(f => f.name === name);
        if(!file) return alert('File not found');

        const url = URL.createObjectURL(file.blob);
        document.getElementById('player').classList.remove('hidden');
        document.getElementById('title').textContent = (type==='audio'?'🎵 ':'🎬 ') + name;

        if(type === 'audio') {
          document.getElementById('video').classList.add('hidden');
          document.getElementById('audio').classList.remove('hidden');
          document.getElementById('audio').src = url;
          document.getElementById('audio').play();
        } else {
          document.getElementById('audio').classList.add('hidden');
          document.getElementById('video').classList.remove('hidden');
          document.getElementById('video').src = url;
          document.getElementById('video').play();
        }
      };
    }

    function closePlayer() {
      document.getElementById('player').classList.add('hidden');
      document.getElementById('audio').pause();
      document.getElementById('video').pause();
    }

    function clearAll() {
      if(confirm('Delete ALL your music + movies?')) {
        indexedDB.deleteDatabase('LocalHubDB');
        location.reload();
      }
    }
  </script>
</body>
</html>
