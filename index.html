<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LocalHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: system-ui; margin: 0; padding: 20px; background: #0f172a; color: white; padding-bottom: 120px; }
    .status { padding: 10px; border-radius: 8px; margin-bottom: 15px; }
    .online { background: #16a34a; }
    .offline { background: #dc2626; }
    .card { background: #1e293b; padding: 15px; margin: 10px 0; border-radius: 12px; }
    button { padding: 10px 15px; border: none; border-radius: 8px; background: #3b82f6; color: white; cursor: pointer; margin: 5px; }
    .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; }
    .btn-secondary { background: #475569; }
    .btn-danger { background: #dc2626; }
    input[type="search"] { padding: 10px; border-radius: 8px; border: none; background: #1e293b; color: white; width: 100%; max-width: 300px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-top: 10px; }
    .item { background: #334155; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; }
    .item:hover { background: #475569; }
    .hidden { display: none; }
    .tag { font-size: 12px; background: #16a34a; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
    #player { position: fixed; bottom: 0; left: 0; right: 0; border-radius: 12px 12px 0 0; z-index: 100; }
    input[type="file"] { margin: 10px 0; color: white; }
  </style>
</head>
<body>
  <div id="status" class="status">Checking connection...</div>
  <h1>LocalHub 🎵🎬🎮</h1>

  <input type="search" id="searchBox" placeholder="Search offline content..." onkeyup="searchContent()">

  <div class="btn-group">
    <button onclick="showSection('all')">🏠 All</button>
    <button class="btn-secondary" onclick="showSection('now')">▶️ Now Watching</button>
    <button class="btn-secondary" onclick="showSection('favorites')">❤️ Favorites</button>
    <button class="btn-secondary" onclick="showSection('later')">⏰ Watch Later</button>
  </div>

  <!-- Upload section -->
  <div class="card">
    <h3>⬆️ Add Files Offline</h3>
    <p>Upload mp3/mp4 once, plays forever offline</p>
    <input type="file" id="fileInput" accept="audio/*,video/*" multiple onchange="saveFiles(event)">
  </div>

  <!-- Music Section -->
  <div class="card" id="music-section">
    <h3>🎵 Offline Music <span class="tag">Royalty-Free</span></h3>
    <div class="btn-group">
      <button class="btn-secondary" onclick="loadFromDB('audio')">📚 Library</button>
      <button class="btn-secondary" onclick="loadFromDB('audio')">🎶 All Songs</button>
    </div>
    <div class="grid" id="music-grid"></div>
  </div>

  <!-- Movies Section -->
  <div class="card" id="movies-section">
    <h3>🎬 Offline Movies & Series <span class="tag">Public Domain</span></h3>
    <div class="btn-group">
      <button class="btn-secondary" onclick="loadFromDB('video')">🎥 Movies</button>
      <button class="btn-secondary" onclick="loadFromDB('video')">📺 Series</button>
    </div>
    <div class="grid" id="movies-grid"></div>
  </div>

  <!-- Player -->
  <div id="player" class="card hidden">
    <p id="player-title">Nothing playing</p>
    <audio id="audioPlayer" controls style="width: 100%"></audio>
    <video id="videoPlayer" controls style="width: 100%; max-height: 300px" class="hidden"></video>
    <button class="btn-danger" onclick="closePlayer()">Close</button>
  </div>

  <script>
    let db;

    // Init IndexedDB
    const request = indexedDB.open('LocalHubDB', 1);
    request.onupgradeneeded = e => {
      db = e.target.result;
      db.createObjectStore('media', { keyPath: 'id' });
    };
    request.onsuccess = e => {
      db = e.target.result;
      loadFromDB('audio');
      loadFromDB('video');
    };

    // Save uploaded files to IndexedDB
    function saveFiles(e) {
      const files = e.target.files;
      const tx = db.transaction('media', 'readwrite');
      const store = tx.objectStore('media');
      
      for(let file of files) {
        const item = {
          id: file.name + Date.now(),
          name: file.name,
          type: file.type.startsWith('audio') ? 'audio' : 'video',
          blob: file
        };
        store.add(item);
      }
      
      tx.oncomplete = () => {
        alert('Files saved offline! Reload to see them.');
        loadFromDB('audio');
        loadFromDB('video');
      };
    }

    // Load from IndexedDB
    function loadFromDB(type) {
      const grid = type === 'audio' ? 'music-grid' : 'movies-grid';
      document.getElementById(grid).innerHTML = '';
      
      const tx = db.transaction('media', 'readonly');
      const store = tx.objectStore('media');
      store.getAll().onsuccess = e => {
        const items = e.target.result.filter(i => i.type === type);
        if(items.length === 0) {
          document.getElementById(grid).innerHTML = `<p style="opacity:0.6">No ${type} files yet. Upload some above 👆</p>`;
          return;
        }
        items.forEach(item => {
          document.getElementById(grid).innerHTML += 
            `<div class="item" onclick="playMedia('${item.id}')">${item.name}</div>`;
        });
      };
    }

    // Play media from IndexedDB
    function playMedia(id) {
      const tx = db.transaction('media', 'readonly');
      const store = tx.objectStore('media');
      store.get(id).onsuccess = e => {
        const item = e.target.result;
        const url = URL.createObjectURL(item.blob);
        const audio = document.getElementById('audioPlayer');
        const video = document.getElementById('videoPlayer');
        const player = document.getElementById('player');
        const title = document.getElementById('player-title');
        
        if(item.type === 'audio') {
          video.classList.add('hidden');
          audio.classList.remove('hidden');
          audio.src = url;
          title.textContent = '🎵 ' + item.name;
        } else {
          audio.classList.add('hidden');
          video.classList.remove('hidden');
          video.src = url;
          title.textContent = '🎬 ' + item.name;
        }
        player.classList.remove('hidden');
        audio.play();
        video.play();
      };
    }

    function closePlayer() {
      document.getElementById('player').classList.add('hidden');
      document.getElementById('audioPlayer').pause();
      document.getElementById('videoPlayer').pause();
    }

    // Online status
    function updateStatus() {
      const el = document.getElementById('status');
      el.className = 'status ' + (navigator.onLine ? 'online' : 'offline');
      el.textContent = navigator.onLine ? 'Online' : 'Offline - LocalHub working';
    }
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
